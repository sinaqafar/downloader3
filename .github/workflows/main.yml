name: Download Large File in Chunks and Pack to RAR

on:
  workflow_dispatch:

jobs:
  chunked-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rar
        run: sudo apt-get update && sudo apt-get install -y rar

      - name: Get file size and download in chunks if >95MB
        env:
          URL: "https://example.com/largefile.zip"   # لینک فایل بزرگ
        run: |
          # دریافت اندازه فایل (به بایت)
          SIZE=$(curl -sI "$URL" | grep -i "Content-Length" | awk '{print $2}' | tr -d '\r')
          THRESHOLD=$((95 * 1024 * 1024))  # 95 مگابایت
          CHUNK_SIZE=$((10 * 1024 * 1024)) # هر تکه 10 مگابایت

          if [ -z "$SIZE" ]; then
            echo "Could not determine file size, downloading normally."
            curl -L -o downloaded_file "$URL"
          elif [ "$SIZE" -le "$THRESHOLD" ]; then
            echo "File size ($SIZE bytes) <= 95MB, downloading normally."
            curl -L -o downloaded_file "$URL"
          else
            echo "File size ($SIZE bytes) > 95MB, downloading in chunks..."
            # محاسبه تعداد تکه‌ها
            PARTS=$(( (SIZE + CHUNK_SIZE - 1) / CHUNK_SIZE ))
            echo "Total parts: $PARTS"

            # دانلود تکه‌ها (در حلقه)
            for ((i=0; i<PARTS; i++)); do
              START=$((i * CHUNK_SIZE))
              END=$((START + CHUNK_SIZE - 1))
              if [ $END -ge $SIZE ]; then
                END=$((SIZE - 1))
              fi
              echo "Downloading part $i: bytes $START-$END"
              curl -L -r "$START-$END" -o "chunk_$i" "$URL"
            done

            # چسباندن تکه‌ها
            cat chunk_* > downloaded_file
            rm chunk_*
          fi

      - name: Create RAR archive (split into 95MB volumes if needed)
        run: |
          # اگر می‌خواهید خود فایل RAR نیز به حجم 95 مگابایت تکه شود:
          rar a -v95m -r final_archive.rar downloaded_file

      - name: Upload RAR volumes as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rar-parts
          path: |
            final_archive.part*.rar
            final_archive.rar
